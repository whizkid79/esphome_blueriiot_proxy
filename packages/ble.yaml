globals:
  - id: blueriiot_measurement_running
    type: bool
    restore_value: no
    initial_value: "false"

  - id: blueriiot_connection_attempt_started
    type: bool
    restore_value: no
    initial_value: "false"

  - id: blueriiot_connected
    type: bool
    restore_value: no
    initial_value: "false"

  - id: blueriiot_scanner_running
    type: bool
    restore_value: no
    initial_value: "false"

  - id: blueriiot_last_packet_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: blueriiot_ble_connect_attempts
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: blueriiot_ble_connect_timeouts
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: blueriiot_ble_packet_timeouts
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: blueriiot_ble_disconnect_errors
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: blueriiot_ble_successful_packets
    type: uint32_t
    restore_value: no
    initial_value: "0"

esp32_ble:
  connection_timeout: 20s

esp32_ble_tracker:
  scan_parameters:
    active: false
    interval: 1000ms
    # 30% duty cycle: enough to catch BlueRiiot advertisements for a
    # connect-by-MAC while leaving WiFi/mDNS/OTA most of the radio time
    # (single-core ESP32-C3 shares one radio between BLE and WiFi).
    # Raise towards 700ms only if discovery becomes unreliable.
    window: 500ms
    continuous: false
  software_coexistence: true
  on_ble_advertise:
    - mac_address: ${blueriiot_mac}
      then:
        - logger.log:
            tag: blueriiot_ble
            level: DEBUG
            format: "Found BlueRiiot advertisement"
        - if:
            condition:
              lambda: |-
                return id(blueriiot_measurement_running) &&
                       !id(blueriiot_connection_attempt_started);
            then:
              - lambda: |-
                  id(blueriiot_ble_connect_attempts)++;
                  id(blueriiot_connection_attempt_started) = true;
                  id(component_${blueriiot_id_prefix}).publish_status("BLE_ADVERTISEMENT_FOUND");
              - script.execute: script_${blueriiot_id_prefix}_attempt_guard

api:
  on_client_connected:
    - if:
        condition:
          lambda: return !id(blueriiot_scanner_running);
        then:
          - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
          - script.execute: script_${blueriiot_id_prefix}_start_scanner
  on_client_disconnected:
    - if:
        condition:
          not:
            api.connected:
        then:
          - script.stop: script_${blueriiot_id_prefix}_start_scanner
          - lambda: |-
              id(blueriiot_measurement_running) = false;
              id(blueriiot_connection_attempt_started) = false;
              id(blueriiot_connected) = false;
              id(blueriiot_scanner_running) = false;
              id(component_${blueriiot_id_prefix}).publish_status("BLE_WAITING_FOR_API");
          - script.stop: script_${blueriiot_id_prefix}_attempt_guard
          - script.stop: script_${blueriiot_id_prefix}_measure
          - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
          - esp32_ble_tracker.stop_scan:

ble_client:
  - mac_address: ${blueriiot_mac}
    id: ble_client_${blueriiot_id_prefix}
    auto_connect: true
    on_connect:
      then:
        - if:
            condition:
              lambda: return id(blueriiot_measurement_running);
            then:
              - lambda: |-
                  id(blueriiot_connected) = true;
                  id(component_${blueriiot_id_prefix}).publish_status("BLE_CONNECTED");
              - delay: 2s
              - if:
                  condition:
                    lambda: return id(blueriiot_measurement_running);
                  then:
                    - ble_client.ble_write:
                        id: ble_client_${blueriiot_id_prefix}
                        service_uuid: "F3300001-F0A2-9B06-0C59-1BC4763B5C00"
                        characteristic_uuid: "F3300002-F0A2-9B06-0C59-1BC4763B5C00"
                        value: !lambda |-
                          return {0x01};
                    - lambda: |-
                        id(component_${blueriiot_id_prefix}).publish_status("BLE_WRITE_SENT");
            else:
              - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
    on_disconnect:
      then:
        - if:
            condition:
              lambda: return id(blueriiot_measurement_running);
            then:
              - lambda: |-
                  id(blueriiot_ble_disconnect_errors)++;
                  id(blueriiot_measurement_running) = false;
                  id(blueriiot_connection_attempt_started) = false;
                  id(blueriiot_connected) = false;
                  id(component_${blueriiot_id_prefix}).publish_status("BLE_DISCONNECTED_ERROR");
                  id(text_sensor_${blueriiot_id_prefix}_ble_last_timeout).publish_state("DISCONNECTED_ERROR");
              - script.stop: script_${blueriiot_id_prefix}_attempt_guard
              - script.stop: script_${blueriiot_id_prefix}_measure
              - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable

switch:
  - platform: ble_client
    ble_client_id: ble_client_${blueriiot_id_prefix}
    id: switch_${blueriiot_id_prefix}_ble_enable
    name: "${blueriiot_name_prefix} BLE Enable"
    restore_mode: ALWAYS_OFF
    internal: true

script:
  # Starts the continuous scan once the BLE stack is actually up.
  # Right after boot the first API client can connect before the BLE stack
  # is active; esp32_ble_tracker.start_scan would then be silently ignored
  # while blueriiot_scanner_running claims the scanner is up (stale flag).
  - id: script_${blueriiot_id_prefix}_start_scanner
    mode: restart
    then:
      - wait_until:
          condition:
            ble.enabled:
          timeout: 15s
      - if:
          condition:
            ble.enabled:
          then:
            - lambda: |-
                id(blueriiot_scanner_running) = true;
                id(component_${blueriiot_id_prefix}).publish_status("BLE_SCAN_READY");
            - esp32_ble_tracker.start_scan:
                continuous: true
          else:
            - lambda: |-
                id(blueriiot_scanner_running) = false;
                id(component_${blueriiot_id_prefix}).publish_status("BLE_STACK_DISABLED");

  - id: script_${blueriiot_id_prefix}_measure
    mode: single
    then:
      - if:
          condition:
            lambda: return id(blueriiot_scanner_running);
          then:
            - lambda: |-
                id(blueriiot_measurement_running) = true;
                id(blueriiot_connection_attempt_started) = false;
                id(blueriiot_connected) = false;
                id(blueriiot_last_packet_ok) = false;
                id(component_${blueriiot_id_prefix}).publish_status("BLE_WAITING_FOR_ADVERTISEMENT");
            - switch.turn_on: switch_${blueriiot_id_prefix}_ble_enable
            - delay: ${blueriiot_ble_timeout}
            - if:
                condition:
                  lambda: |-
                    return id(blueriiot_measurement_running) &&
                           !id(blueriiot_connection_attempt_started);
                then:
                  - lambda: |-
                      id(blueriiot_measurement_running) = false;
                      id(blueriiot_connection_attempt_started) = false;
                      id(blueriiot_connected) = false;
                      id(component_${blueriiot_id_prefix}).publish_status("BLE_ADVERTISEMENT_TIMEOUT");
                  - script.stop: script_${blueriiot_id_prefix}_attempt_guard
                  - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
                  # A full cycle without a single advertisement can also mean
                  # the scanner flag is stale (start_scan was silently
                  # ignored). Re-arm the scanner; if it is actually running
                  # the extra start_scan is ignored and the flag stays true.
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |-
                            id(blueriiot_scanner_running) = false;
                        - script.execute: script_${blueriiot_id_prefix}_start_scanner
          else:
            # Distinguish "API is down" from "scanner flag never got set"
            # and try to recover the latter instead of only reporting it.
            - if:
                condition:
                  api.connected:
                then:
                  - lambda: |-
                      id(component_${blueriiot_id_prefix}).publish_status("BLE_SCANNER_NOT_READY");
                  - script.execute: script_${blueriiot_id_prefix}_start_scanner
                else:
                  - lambda: |-
                      id(component_${blueriiot_id_prefix}).publish_status("BLE_WAITING_FOR_API");

  - id: script_${blueriiot_id_prefix}_attempt_guard
    mode: restart
    then:
      - delay: 90s
      - if:
          condition:
            lambda: return id(blueriiot_measurement_running);
          then:
            - lambda: |-
                const bool connected = id(blueriiot_connected);
                if (connected) {
                  id(blueriiot_ble_packet_timeouts)++;
                  id(text_sensor_${blueriiot_id_prefix}_ble_last_timeout).publish_state("PACKET_TIMEOUT");
                } else {
                  id(blueriiot_ble_connect_timeouts)++;
                  id(text_sensor_${blueriiot_id_prefix}_ble_last_timeout).publish_state("CONNECT_TIMEOUT");
                }
                id(blueriiot_measurement_running) = false;
                id(blueriiot_connection_attempt_started) = false;
                id(blueriiot_connected) = false;
                id(component_${blueriiot_id_prefix}).publish_status(
                  connected ? "BLE_PACKET_TIMEOUT" : "BLE_CONNECT_TIMEOUT");
            - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
            - script.stop: script_${blueriiot_id_prefix}_measure

text_sensor:
  - platform: ble_client
    id: text_sensor_${blueriiot_id_prefix}_reading_data
    name: "${blueriiot_name_prefix} Reading Data"
    internal: true
    ble_client_id: ble_client_${blueriiot_id_prefix}
    service_uuid: "F3300001-F0A2-9B06-0C59-1BC4763B5C00"
    characteristic_uuid: "F3300003-F0A2-9B06-0C59-1BC4763B5C00"
    notify: true
    update_interval: never
    on_notify:
      then:
        - lambda: |-
            id(blueriiot_last_packet_ok) = id(component_${blueriiot_id_prefix}).handle_packet(x);
            id(blueriiot_measurement_running) = false;
            id(blueriiot_connection_attempt_started) = false;
            id(blueriiot_connected) = false;
        - script.stop: script_${blueriiot_id_prefix}_attempt_guard
        - script.stop: script_${blueriiot_id_prefix}_measure
        - switch.turn_off: switch_${blueriiot_id_prefix}_ble_enable
        - if:
            condition:
              lambda: return id(blueriiot_last_packet_ok);
            then:
              - lambda: |-
                  id(blueriiot_ble_successful_packets)++;
                  id(text_sensor_${blueriiot_id_prefix}_ble_last_timeout).publish_state("NONE");
              - script.execute: script_${blueriiot_id_prefix}_persist_last_good_values
              - script.execute: script_${blueriiot_id_prefix}_record_successful_measurement_timestamp
              - if:
                  condition:
                    lambda: return id(switch_${blueriiot_id_prefix}_api_enabled).state;
                  then:
                    - script.execute: script_${blueriiot_id_prefix}_submit_raw_measure
